<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniRotas - Vendedor</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #BF9A56;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(180deg, #1e293b, #0f172a);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .brand span {
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(191, 154, 86, 0.3);
        }

        .app-screen {
            display: none;
            flex: 1;
            padding: 20px;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .status-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }

        .tracking-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(191, 154, 86, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .tracking-indicator.active {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(0, 255, 136, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="login-screen" class="login-screen">
        <div class="brand">
            <h1>Uni<span>Rotas</span></h1>
            <p style="opacity: 0.6;">App do Vendedor</p>
        </div>
        <div class="input-group">
            <label>Usuário UniRotas</label>
            <input type="text" placeholder="Seu usuário" value="vendedor_01">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="••••••••" value="123456">
        </div>
        <button class="btn" onclick="login()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="app-screen" class="app-screen">
        <div class="header">
            <h3>Monitoramento</h3>
            <span id="vendedor-name" style="color: var(--primary); font-size: 0.9rem;">Admin UniRotas</span>
        </div>

        <div class="status-card">
            <div id="status-icon" class="tracking-indicator">
                <i data-lucide="map-pin" size="40"></i>
            </div>
            <h2 id="status-text">Rastreamento Inativo</h2>
            <p id="coords-text" style="font-size: 0.8rem; opacity: 0.5;">Aguardando sinal GPS...</p>
        </div>

        <button id="btn-toggle-tracking" class="btn" onclick="toggleTracking()">INICIAR EXPEDIENTE</button>

        <div style="margin-top: 20px; text-align: center; opacity: 0.6; font-size: 0.8rem;">
            Integração ION Rotas Ativa
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyD3Mh2iQev84QtQJ96TCdOXS5UFn_OpNAg",
          authDomain: "unirotas-e9e9c.firebaseapp.com",
          projectId: "unirotas-e9e9c",
          storageBucket: "unirotas-e9e9c.firebasestorage.app",
          messagingSenderId: "698279255356",
          appId: "1:698279255356:web:8bda755ad6368bb291d239",
          measurementId: "G-3XQHNZL9XS",
          databaseURL: "https://unirotas-e9e9c-default-rtdb.firebaseio.com"
        };

        // Inicializa Firebase
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase Vendedor Inicializado.");
        }

        lucide.createIcons();
        let isTracking = false;
        let watchId = null;
        let lastLat = 0, lastLon = 0;

        function login() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        }

        function toggleTracking() {
            if (!isTracking) {
                startTracking();
            } else {
                stopTracking();
            }
        }

        function startTracking() {
            if (!navigator.geolocation) {
                alert("GPS não suportado.");
                return;
            }

            isTracking = true;
            document.getElementById('btn-toggle-tracking').innerText = "ENCERRAR EXPEDIENTE";
            document.getElementById('btn-toggle-tracking').style.background = "#ef4444";
            document.getElementById('status-icon').classList.add('active');
            document.getElementById('status-text').innerText = "Rastreando Agora";

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastLat = pos.coords.latitude;
                    lastLon = pos.coords.longitude;
                    document.getElementById('coords-text').innerText = `Lat: ${lastLat.toFixed(5)}, Lon: ${lastLon.toFixed(5)}`;
                    sendLocationToFirebase(lastLat, lastLon);
                },
                (err) => {
                    console.error(err);
                    alert("Erro ao obter GPS. Verifique as permissões do navegador.");
                },
                { enableHighAccuracy: true }
            );
        }

        function stopTracking() {
            isTracking = false;
            document.getElementById('btn-toggle-tracking').innerText = "INICIAR EXPEDIENTE";
            document.getElementById('btn-toggle-tracking').style.background = "#BF9A56";
            document.getElementById('status-icon').classList.remove('active');
            document.getElementById('status-text').innerText = "Rastreamento Inativo";
            if (watchId) navigator.geolocation.clearWatch(watchId);
        }

        function sendLocationToFirebase(lat, lon, status = "Online") {
            if (typeof firebase === 'undefined') return;
            
            const vendedorCode = "vendedor_01"; // Idealmente viria do login
            
            firebase.database().ref('vendedores/' + vendedorCode).set({
                lat: lat,
                lng: lon,
                timestamp: new Date().toISOString(),
                status: status,
                name: "Admin UniRotas"
            }).catch(e => console.error("Erro ao enviar para Firebase:", e));
        }
    </script>
</body>

</html>
